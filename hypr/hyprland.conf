################
### MONITORS ###
################

# Left: Acer XB271HU 1440p
monitor = DP-5, 2560x1440@144, 0x360, 1

# Center (main): LG OLED 4K (10-bit HDR)
monitor = HDMI-A-2, 3840x2160@144, 2560x0, 1, bitdepth, 10, cm, hdr, sdrbrightness, 1.2

# Right: Philips 4K, scaled to match 1440p
monitor = DP-6, 3840x2160@60, 6400x216, 1.25

# Fallback for any other monitor
monitor = , preferred, auto, auto

# Pin workspace ranges to monitors
workspace = 1, monitor:HDMI-A-2, default:true
workspace = 2, monitor:HDMI-A-2
workspace = 3, monitor:HDMI-A-2
workspace = 4, monitor:HDMI-A-2
workspace = 5, monitor:HDMI-A-2
workspace = 6, monitor:HDMI-A-2
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2
workspace = 10, monitor:HDMI-A-2
workspace = 11, monitor:DP-5, default:true
workspace = 12, monitor:DP-5
workspace = 13, monitor:DP-5
workspace = 14, monitor:DP-5
workspace = 15, monitor:DP-5
workspace = 16, monitor:DP-5
workspace = 17, monitor:DP-5
workspace = 18, monitor:DP-5
workspace = 19, monitor:DP-5
workspace = 20, monitor:DP-5
workspace = 21, monitor:DP-6, default:true
workspace = 22, monitor:DP-6
workspace = 23, monitor:DP-6
workspace = 24, monitor:DP-6
workspace = 25, monitor:DP-6
workspace = 26, monitor:DP-6
workspace = 27, monitor:DP-6
workspace = 28, monitor:DP-6
workspace = 29, monitor:DP-6
workspace = 30, monitor:DP-6


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = fuzzel
$browser = firefox


#################
### AUTOSTART ###
#################

# Status bar
exec-once = waybar

# Notifications
exec-once = dunst

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Wallpaper daemon + fetch initial wallpaper
exec-once = swww-daemon
exec-once = sleep 2 && /home/gray/.config/swww/bing-wallpaper.sh

# Idle and lock
exec-once = hypridle


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(585b70aa)

    resize_on_border = true
    allow_tearing = true
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        vibrancy = 0.17
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor, 1, 7, quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    allow_session_lock_restore = true
}

render {
    cm_enabled = true
    cm_fs_passthrough = 1
}

plugin:hyprexpo {
    columns = 3
    gap_size = 5
    bg_col = rgb(1e1e2e)
    workspace_method = center current
}



#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace


####################
### KEYBINDINGS  ###
####################

$mainMod = SUPER

# Core
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, T, togglefloating,

# Clipboard history
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Screenshots
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp -d)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mainMod, Print, exec, grim - | wl-copy
bind = $mainMod SHIFT, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Workspace overview (Super + `)
bind = $mainMod, grave, hyprexpo:expo, toggle

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces — independent per monitor
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/workspace.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/workspace.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/workspace.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/workspace.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/workspace.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/workspace.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/workspace.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/workspace.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/workspace.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/workspace.sh 10

# Move active window to workspace — independent per monitor
bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/workspace.sh 1 move
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/workspace.sh 2 move
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/workspace.sh 3 move
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/workspace.sh 4 move
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/workspace.sh 5 move
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/workspace.sh 6 move
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/workspace.sh 7 move
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/workspace.sh 8 move
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/workspace.sh 9 move
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/workspace.sh 10 move

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces on current monitor
bind = $mainMod, mouse_down, workspace, r+1
bind = $mainMod, mouse_up, workspace, r-1

# Cycle workspaces with Super+Ctrl+Arrow
bind = $mainMod CTRL, right, workspace, r+1
bind = $mainMod CTRL, left, workspace, r-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Game rules — fullscreen and tearing for Steam games
windowrule {
    name = steam-game
    match:class = ^(steam_app_.*)$
    fullscreen = 1
    suppress_event = maximize
}
