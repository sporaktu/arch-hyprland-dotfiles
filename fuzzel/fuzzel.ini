[main]
font=AtkynsonMono Nerd Font:size=13
dpi-aware=yes
prompt=>
icon-theme=Papirus-Dark
icons-enabled=yes
fields=filename,name,generic
lines=8
width=35
horizontal-pad=20
vertical-pad=10
inner-pad=8
layer=overlay
match-mode=fzf

[colors]
# Catppuccin Mocha
background=1e1e2edd
text=cdd6f4ff
match=f5c2e7ff
selection=585b70ff
selection-text=cdd6f4ff
selection-match=f5c2e7ff
border=cba6f7ff
placeholder=6c7086ff

[border]
width=2
radius=15
